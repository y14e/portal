<html lang="en">
<body>
<h1>Portal Example</h1>
<p>This is the main page content.</p>
<p><a href="https://www.example.com" target="_blank">Link 1</a></p>
<p><a href="https://www.example.com" target="_blank">Link 2</a></p>
<p>{Portal 1}</p>
<div id="my-portal-1">
  <h2>Portal 1 content</h2>
  <p>This content is rendered in a portal.</p>
  <p><a href="https://www.example.com" target="_blank">Portal Link 1</a></p>
  <p><a href="https://www.example.com" target="_blank">Portal Link 2</a></p>
  <p><button id="revert1" type="button">Revert portal 1</button></p>
</div>
<p><a href="https://www.example.com" target="_blank">Link between</a></p>
<p>{Portal 2}</p>
<div id="my-portal-2">
  <h2>Portal 2 content</h2>
  <p>This content is rendered in a portal.</p>
  <p><a href="https://www.example.com" target="_blank">Portal Link 1</a></p>
  <p><a href="https://www.example.com" target="_blank">Portal Link 2</a></p>
  <p><button id="revert2" type="button">Revert portal 2</button></p>
</div>
<p><a href="https://www.example.com" target="_blank">Link 5</a></p>
<p><a href="https://www.example.com" target="_blank">Link 6</a></p>
<script type="module">
import { createPortal } from './portal.js';

const { cleanup: cleanup1 } = createPortal(document.getElementById('my-portal-1'));
const { cleanup: cleanup2 } = createPortal(document.getElementById('my-portal-2'));

document.getElementById('revert1').addEventListener('click', () => {
  cleanup1();
});
document.getElementById('revert2').addEventListener('click', () => {
  cleanup2();
});
</script>
</body>
</html>
